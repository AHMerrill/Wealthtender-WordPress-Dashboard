# docker-compose.yml — WordPress + MySQL local development
#
# Usage:
#   docker compose up -d          # start WordPress + MySQL
#   docker compose down           # stop everything
#   docker compose down -v        # stop + remove database volumes
#
# WordPress will be at http://localhost:8080
# Complete the WP install wizard, then activate the
# "Wealthtender Analytics" plugin from Plugins > Installed Plugins.

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: wordpress
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

  wordpress:
    image: wordpress:6.4-php8.2-apache
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: "true"
    volumes:
      # Mount the plugin into WordPress
      - ./wealthtender-analytics:/var/www/html/wp-content/plugins/wealthtender-analytics
      # Mount artifacts so the plugin can read scored CSVs
      - ./artifacts:/var/www/html/wp-content/plugins/wealthtender-analytics/data/artifacts
      # Mount brand assets
      - ./Brandbook/assets:/var/www/html/wp-content/plugins/wealthtender-analytics/data/brand
      - wp_data:/var/www/html

volumes:
  db_data:
  wp_data:
